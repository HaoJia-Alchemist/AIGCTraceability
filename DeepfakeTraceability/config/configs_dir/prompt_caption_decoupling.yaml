solver:
  margin: 0.3
  stage1:
    type: "Adam"
    base_lr: 0.003
    weight_decay: 0.0005
    weight_decay_bias: 0.0005
    momentum: 0.9
    lr_min: 1e-6
    warmup_lr_init: 0.00001
    warmup_epoch: 3
  stage2:
#    type: "Adam"
#    base_lr: 0.03
#    weight_decay: 0.0005
#    weight_decay_bias: 0.0005
#    bias_lr_factor: 0.1
#    large_fc_lr: false
#    momentum: 0.9
#    margin: 0.3
#    center_lr: 0.5
#    center_loss_weight: 0.005
#    steps: [40, 70]
#    gamma: 0.1
#    warmup_factor: 0.01
#    warmup_iters: 500
#    warmup_method: "linear"
    type: "Adam"
    base_lr: 0.01
    weight_decay: 0.0005
    weight_decay_bias: 0.0005
    momentum: 0.9
    margin: 0.3
    bias_lr_factor: 0.1
    large_fc_lr: false
    center_lr: 0.5
    center_loss_weight: 0.005
    steps: [40, 70]
    gamma: 0.1
    warmup_factor: 0.01
    warmup_iters: 500
    warmup_method: "linear"

dataset:
  name: "DFT30"
  resolution: 224
  train_batch_size: 36
  test_batch_size: 64
  num_instances: 12
  num_classes: 15
  sampler: "softmax_triplet"
  use_data_augmentation: true  # Add this flag to enable/disable data augmentation
  data_aug:
    flip_prob: 0.5
    rotate_prob: 0.5
    rotate_limit: [ -10, 10 ]
    blur_prob: 0.5
    blur_limit: [ 3, 7 ]
    brightness_prob: 0.5
    brightness_limit: [ -0.1, 0.1 ]
    contrast_limit: [ -0.1, 0.1 ]
    quality_lower: 40
    quality_upper: 100