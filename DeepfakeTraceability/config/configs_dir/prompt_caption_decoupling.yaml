task_name: "clip_vit_l14_prompt_caption_decoupling"
model_weights: /root/autodl-fs/workspace/GenTrace30/DeepfakeTraceability/logs/prompt_caption_decoupling_s2_cgd_20260207215535/best_model/model.pth
#mdoel_weights: null
model:
  name: "Prompt_Caption_Decoupling"
  backbone: "ViT-L/14"
  pretrained: null
  feat_dim: 1024
  stride_size: 14
  metric_loss_type: "triplet"
  no_margin: false
  if_label_smooth: "on"
  id_loss_weight: 1.0
  triplet_loss_weight: 1.0
  i2t_loss_weight: 1.0
  caption_loss: 1.0
  content_loss_weight: 0.5
  orth_loss_weight: 0.01


train:
  processor: "prompt_learn_caption"
#  processor: "base"
  log_period: 50
  checkpoint_period: 1
  eval_period: 1
  max_epoch_stage1: 5
  max_epoch_stage2: 40

test:
  feat_norm: "yes"
  processor: "base"
  neck_feat: "after"
  re_ranking: false
  use_pca: false
  pca_dim: 128
  use_clustering: false
  n_clusters: 100
  use_medoid: false


